name: ZevLink

options:
  bundleIdPrefix: com.zevclip
  deploymentTarget:
    macOS: "14.0"

targets:
  ZevClip:
    type: application
    platform: macOS
    sources:
      - ZevClip
    info:
      path: ZevClip/Info.plist
      properties:
        CFBundleDisplayName: ZevLink
        CFBundleShortVersionString: "2.1.0"
        CFBundleVersion: "21"
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        NSBonjourServices:
          - _zevclip._tcp
          - _zevclip-android._tcp
        NSLocalNetworkUsageDescription: ZevLink receives clipboard text from devices on your local network.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zevlink.receiver
        PRODUCT_NAME: ZevLink
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "2.1.0"
        CURRENT_PROJECT_VERSION: "21"
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        OTHER_CODE_SIGN_FLAGS: "--options runtime"

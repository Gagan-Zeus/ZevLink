name: ZevClip

options:
  bundleIdPrefix: com.zevclip
  deploymentTarget:
    macOS: "14.0"

targets:
  ZevClip:
    type: application
    platform: macOS
    sources:
      - ZevClip
    info:
      path: ZevClip/Info.plist
      properties:
        CFBundleDisplayName: ZevClip
        LSApplicationCategoryType: public.app-category.utilities
        NSBonjourServices:
          - _zevclip._tcp
        NSLocalNetworkUsageDescription: ZevClip receives clipboard text from devices on your local network.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zevclip.receiver
        PRODUCT_NAME: ZevClip
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
